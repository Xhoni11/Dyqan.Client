<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shto Artikull - Dyqan Rrobash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
    <div class="container py-4" style="max-width: 640px;">
        <div class="d-flex align-items-center mb-3 gap-2">
            <a href="index.html" class="btn btn-outline-secondary btn-sm">&larr; Kthehu</a>
            <h1 class="h4 mb-0">Shto Artikull të Ri</h1>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form id="clothing-form">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="emri" class="form-label">Emri</label>
                            <input type="text" id="emri" class="form-control" required />
                        </div>
                        <div class="col-md-6">
                            <label for="brandi" class="form-label">Brandi</label>
                            <input type="text" id="brandi" class="form-control" required />
                        </div>
                        <div class="col-md-6">
                            <label for="madhesia" class="form-label">Madhësia</label>
                            <input type="text" id="madhesia" class="form-control" placeholder="p.sh. S, M, L, 42" required />
                        </div>
                        <div class="col-md-6">
                            <label for="cmimi" class="form-label">Çmimi (L)</label>
                            <input type="number" id="cmimi" class="form-control" min="0" step="0.01" required />
                        </div>
                        <div class="col-md-6">
                            <label for="kategoria" class="form-label">Kategoria</label>
                            <select id="kategoria" class="form-select" required>
                                <option value="">-- Zgjidh --</option>
                                <option>Bluza</option>
                                <option>Pantallona</option>
                                <option>Jakete</option>
                                <option>Këpucë</option>
                                <option>Aksesorë</option>
                                <option>Të tjera</option>
                            </select>
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="neStoq" checked />
                                <label class="form-check-label" for="neStoq">Në Stoq</label>
                            </div>
                        </div>
                        <div class="col-12 d-flex gap-2 justify-content-end">
                            <a href="index.html" class="btn btn-outline-secondary">Anulo</a>
                            <button type="submit" class="btn btn-primary">Shto Artikullin</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="scripts/store-http.js"></script>
    <script src="scripts/add-clothing.js"></script>
</body>
</html>
